name: Run ETF LINGAM Engine

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies with retry
      run: |
        for i in {1..3}; do
          echo "Attempt $i: Installing dependencies..."
          if pip install --retries 5 --timeout 60 -r requirements.txt; then
            echo "Dependencies installed successfully."
            break
          else
            echo "Attempt $i failed. Waiting 10 seconds before retry..."
            sleep 10
          fi
        done

    - name: Run training and upload
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        python main.py --universe all --mode both --upload

    - name: Upload results as artifact (optional)
      uses: actions/upload-artifact@v4
      with:
        name: prediction-results
        path: output/predictions.parquet
